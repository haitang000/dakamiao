name: Android CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# 打 tag 时需要写权限来创建 Release
permissions:
  contents: write

# 同一分支新推送时取消正在跑的旧任务
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 打包 Release APK
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3

      - name: 配置 Gradle（含缓存）
        uses: gradle/actions/setup-gradle@v4

      - name: 赋予 gradlew 执行权限
        run: chmod +x ./gradlew

      - name: 从 Secret 恢复签名密钥库
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > dakamiao-release.jks
            {
              echo "storeFile=dakamiao-release.jks"
              echo "storePassword=$KEYSTORE_PASSWORD"
              echo "keyAlias=$KEY_ALIAS"
              echo "keyPassword=$KEY_PASSWORD"
            } > keystore.properties
            echo "已恢复签名密钥库，将产出已签名 release"
          else
            echo "未配置签名密钥（Secrets 缺失），将产出未签名 release"
          fi

      - name: 构建 Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: 上传 APK 为构建产物
        uses: actions/upload-artifact@v4
        with:
          name: dakamiao-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: 打 tag 时创建 Release 并附上 APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
